triage:
  scanned_image_threshold:
    image_area_ratio_gte: 0.55
    text_chars_per_page_lte: 300

confidence:
  strategy_a_min_confidence: 0.60
  strategy_b_min_confidence: 0.70

escalation:
  allow_a_to_b: true
  allow_b_to_c: false
  max_attempts: 2

cost_estimates_usd:
  strategy_a: 0.001
  strategy_b: 0.01
  strategy_c: 0.10